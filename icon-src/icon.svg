<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tile gradient: blue → purple, diagonal -->
    <linearGradient id="tile" x1="140" y1="120" x2="900" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EA8FF"/>
      <stop offset="0.55" stop-color="#7C7BFF"/>
      <stop offset="1" stop-color="#9B5CF0"/>
    </linearGradient>

    <!-- Top gloss -->
    <linearGradient id="gloss" x1="512" y1="100" x2="512" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Subject sheen -->
    <linearGradient id="sheen" x1="512" y1="300" x2="512" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#EAF0FF"/>
    </linearGradient>

    <!-- Transparency checkerboard -->
    <pattern id="checker" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#ffffff" fill-opacity="0.10"/>
      <rect width="40" height="40" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="40" y="40" width="40" height="40" fill="#ffffff" fill-opacity="0.22"/>
    </pattern>

    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="subjShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#241452" flood-opacity="0.35"/>
    </filter>

    <clipPath id="tileClip">
      <rect x="100" y="100" width="824" height="824" rx="185"/>
    </clipPath>

    <!-- Subject bust (head + shoulders) -->
    <clipPath id="bustClip">
      <path d="M512 300 a132 132 0 1 1 -0.1 0 Z
               M300 792 C300 648 388 566 512 566 C636 566 724 648 724 792 Z"/>
    </clipPath>
  </defs>

  <!-- Tile -->
  <g filter="url(#tileShadow)">
    <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#tile)"/>
  </g>

  <g clip-path="url(#tileClip)">
    <!-- checkerboard shows through around the subject = background removed -->
    <rect x="100" y="100" width="824" height="824" fill="url(#checker)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#gloss)"/>
  </g>

  <!-- Selection marquee (marching-ants) around the subject -->
  <g>
    <rect x="278" y="286" width="468" height="500" rx="40"
          fill="none" stroke="#ffffff" stroke-opacity="0.9"
          stroke-width="7" stroke-dasharray="26 22" stroke-linecap="round"/>
    <!-- corner handles -->
    <g fill="#ffffff">
      <rect x="266" y="274" width="26" height="26" rx="6"/>
      <rect x="732" y="274" width="26" height="26" rx="6"/>
      <rect x="266" y="774" width="26" height="26" rx="6"/>
      <rect x="732" y="774" width="26" height="26" rx="6"/>
    </g>
  </g>

  <!-- The isolated subject -->
  <g filter="url(#subjShadow)">
    <path d="M512 300 a132 132 0 1 1 -0.1 0 Z
             M300 792 C300 648 388 566 512 566 C636 566 724 648 724 792 Z"
          fill="url(#sheen)"/>
  </g>
</svg>

<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="140" y1="120" x2="900" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EA8FF"/><stop offset="0.55" stop-color="#7C7BFF"/><stop offset="1" stop-color="#9B5CF0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="512" y1="100" x2="512" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.28"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="ck" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#ffffff" fill-opacity="0.08"/>
      <rect width="48" height="48" fill="#ffffff" fill-opacity="0.20"/>
      <rect x="48" y="48" width="48" height="48" fill="#ffffff" fill-opacity="0.20"/>
    </pattern>
    <filter id="ts" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/></filter>
    <filter id="ss" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#241452" flood-opacity="0.40"/></filter>
    <clipPath id="clip"><rect x="100" y="100" width="824" height="824" rx="185"/></clipPath>
  </defs>
  <g filter="url(#ts)"><rect x="100" y="100" width="824" height="824" rx="185" fill="url(#tile)"/></g>
  <g clip-path="url(#clip)">
    <rect x="100" y="100" width="824" height="824" fill="url(#ck)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#gloss)"/>
  </g>
  <!-- bold white photo motif: sun + mountains (the "kept" subject) -->
  <g filter="url(#ss)">
    <circle cx="405" cy="405" r="66" fill="#fff"/>
    <path d="M250 720 L455 470 L590 630 L700 500 L800 720 Z" fill="#fff"/>
  </g>
</svg>

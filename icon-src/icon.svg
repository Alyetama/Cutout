<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Cutout app icon</title>
  <desc id="desc">A clean white subject silhouette on a transparent checkerboard field.</desc>
  <defs>
    <linearGradient id="background" x1="164" y1="110" x2="860" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#262A58"/>
      <stop offset="1" stop-color="#181B36"/>
    </linearGradient>
    <linearGradient id="accent" x1="332" y1="264" x2="736" y2="732" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
    <pattern id="checker" width="96" height="96" patternUnits="userSpaceOnUse">
